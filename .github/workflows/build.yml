name: Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: imagecropper

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/imagecropper
            archive_name: imagecropper-linux-x86_64.tar.gz
          - label: windows-x86_64
            target: x86_64-pc-windows-gnu
            binary_path: target/x86_64-pc-windows-gnu/release/imagecropper.exe
            archive_name: imagecropper-windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            pkg-config \
            zip \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libdav1d-dev  # provide dav1d.pc for dav1d-sys

      - name: Build release binary
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package Linux binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ env.BINARY_NAME }}"
          tar -C dist -czf "${{ matrix.archive_name }}" "${{ env.BINARY_NAME }}"

      - name: Package Windows binary
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ env.BINARY_NAME }}.exe"
          cd dist
          zip -9 "../${{ matrix.archive_name }}" "${{ env.BINARY_NAME }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}